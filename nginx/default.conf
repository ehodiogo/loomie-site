# Redirecionamento HTTP -> HTTPS
server {
    listen 80;
    server_name localhost www.localhost n8n.localhost evo.localhost crm.localhost crm.backend.localhost;
    return 301 https://$host$request_uri;
}

# Site estático da Loomie
server {
    listen 443 ssl;
    server_name localhost www.localhost;

    ssl_certificate /etc/ssl/certs/cf-origin.pem;
    ssl_certificate_key /etc/ssl/private/cf-origin-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# n8n
server {
    listen 443 ssl;
    server_name n8n.localhost;

    ssl_certificate /etc/ssl/certs/cf-origin.pem;
    ssl_certificate_key /etc/ssl/private/cf-origin-key.pem;

    location / {
        proxy_pass http://n8n:5678;
        proxy_set_header Host n8n.localhost;   # host correto
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
    }
}

# Evolution API
server {
    listen 443 ssl;
    server_name evo.localhost;

    ssl_certificate /etc/ssl/certs/cf-origin.pem;
    ssl_certificate_key /etc/ssl/private/cf-origin-key.pem;

    location / {
        proxy_pass http://evolution-api:8080; 
        proxy_set_header Host evo.localhost;   # host correto
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

# Frontend CRM
server {
    listen 443 ssl;
    server_name crm.localhost;

    ssl_certificate /etc/ssl/certs/cf-origin.pem;
    ssl_certificate_key /etc/ssl/private/cf-origin-key.pem;

    location / {
        proxy_pass http://crm_frontend:80;
        proxy_set_header Host crm.localhost;  # força host correto
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }
}

# Backend CRM
server {
    listen 443 ssl;
    server_name backend.localhost;

    ssl_certificate /etc/ssl/certs/cf-origin.pem;
    ssl_certificate_key /etc/ssl/private/cf-origin-key.pem;

    location / {
        proxy_pass http://crm_backend:8000;
        proxy_set_header Host backend.localhost;   # força host correto para Django
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}